/* quiz */
function startQuiz(qs){
 let i=0,score=0;
 function showQ(){
  if(i>=qs.length){
   content.innerHTML=`<div class="card"><h2>Score: ${score}/${qs.length}</h2></div>`;
   return;
  }
  let q=qs[i];
  content.innerHTML=`
  <div class="card quiz">
  <h2>${q.q}</h2>
  ${q.a.map(a=>`<button>${a[0]}</button>`).join("")}
  </div>`;
  document.querySelectorAll(".quiz button").forEach((b,idx)=>{
    b.onclick=()=>{
      if(q.a[idx][1]){b.classList.add("correct");score++;}
      else b.classList.add("wrong");
      setTimeout(()=>{i++;showQ();},1000);
    };
  });
 }
 showQ();
}

 player.currentTime = 0;
 player.src = src;
 player.play();

 player.currentTime = 0;

/* Gemini API Integration */
async function askAI() {
 const apiKey = document.getElementById("apiKey").value.trim();
 const prompt = document.getElementById("aiPrompt").value.trim();
 const output = document.getElementById("aiResponse");

 if (!apiKey) {
   alert("Please enter a valid Gemini API key.");
   return;
 }
 if (!prompt) {
   alert("Please enter a question.");
   return;
 }

 localStorage.setItem("gemini_api_key", apiKey);
 output.innerHTML = "Thinking...";

 try {
   // Uses active gemini-3.5-flash model
   const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-3.5-flash:generateContent?key=${apiKey}`, {
     method: "POST",
     headers: {
       "Content-Type": "application/json"
     },
     body: JSON.stringify({
       contents: [
         {
           parts: [
             {
               text: "You are an expert GCSE tutor. Answer the user's GCSE-related study question clearly, structured, and concisely using simple language: " + prompt
             }
           ]
         }
       ]
     })
   });

   const data = await response.json();
   
   if (!response.ok) {
     const errMsg = data.error ? data.error.message : "Unknown API error";
     output.innerHTML = `<span style='color:#ef4444;'><strong>API Error (${response.status}):</strong> ${errMsg}<br><br><em>Note: If you are using a new "AQ." key, verify that you copied the complete key text and that your Google AI Studio account matches the appropriate region rules.</em></span>`;
     return;
   }

   if (data.candidates && data.candidates[0].content.parts[0].text) {
     let text = data.candidates[0].content.parts[0].text;
     text = text
       .replace(/&/g, "&amp;")
       .replace(/</g, "&lt;")
       .replace(/>/g, "&gt;")
       .replace(/\*\*(.*?)\*\*/g, "<strong>$1</strong>")
       .replace(/\*(.*?)\*/g, "<em>$1</em>")
       .replace(/\n/g, "<br>");
     output.innerHTML = text;
   } else {
     output.innerHTML = "<span style='color:#ef4444;'>Failed to parse the response format from Google's servers.</span>";
   }
 } catch (error) {
   output.innerHTML = "<span style='color:#ef4444;'><strong>Connection Error:</strong> " + error.message + "<br><br>This can happen if you are offline, or if your local network blocks requests to Google's API endpoints.</span>";
 }
}

 <p>Computer Science covers how computer architecture processes logic, stores information, communicates over networks, and relies on computational design to resolve complex operations.</p>

 <p>All operations rely on processing binary values (represented on/off electrically via 1 and 0). Data formats require standard structures:</p>
 <ul>
  <li><strong>Bits and Bytes:</strong> 1 byte = 8 bits, 1 kilobyte (KB) = 1000 bytes, 1 megabyte (MB) = 1000 KB.</li>
  <li><strong>Denary to Binary Conversion:</strong> Represent values using place columns (128, 64, 32, 16, 8, 4, 2, 1). To write 75 in binary: 01001011 (64 + 8 + 2 + 1).</li>
  <li><strong>Hexadecimal:</strong> Base-16 notation (0-9, then A-F representing 10-15). It serves as a human-friendly shorthand for binary strings (e.g., color codes).</li>
  <li><strong>Character Encoding:</strong> Maps text to binary strings. <em>ASCII</em> (7-bit, handles 128 characters) and <em>Unicode</em> (16-32 bit, represents global scripts/emojis).</li>
 </ul>

 <h3>2. Computational Thinking & Algorithms</h3>
 <p>Logic requires systematic strategies to find and organize data:</p>
 <ul>
  <li><strong>Linear Search:</strong> Inspects every list element in order. Best for unsorted datasets.</li>
  <li><strong>Binary Search:</strong> Repeatedly splits a <em>sorted</em> dataset in half. Rapidly narrows searches.</li>
  <li><strong>Bubble Sort:</strong> Moves through a list swapping adjacent items that are out of order. Inefficient for large datasets.</li>
  <li><strong>Merge Sort:</strong> A divide-and-conquer approach. Splits lists into singular items, then merges them in order. Highly efficient.</li>
 </ul>

 <ul>

  <li><strong>Data Types:</strong> Integers (whole numbers), Real/Float (decimals), Boolean (True/False), Character (single letter), and String (text chain).</li>

 <p>Physical elements enable software execution:</p>

<div class="card">
 <h2>GCSE Syllabus Overview</h2>
 <p>GCSE Biology explores life at every scale, from tiny cellular processes to complex bodily systems and ecosystems.</p>
 
 <h3>1. Cell Biology & Specialisation</h3>
 <p>Cells serve as the fundamental structural units of all life:</p>
 <ul>
  <li><strong>Eukaryotic Cells:</strong> Present in plants and animals. Contain genetic material enclosed within a membrane-bound nucleus, alongside organelles like mitochondria and ribosomes.</li>
  <li><strong>Prokaryotic Cells:</strong> Simple bacterial cells. Much smaller and lack a nucleus; DNA floats freely in plasmids or loop structures.</li>
  <li><strong>Specialised Cells:</strong> Form follows function.
   <ul>
    <li><em>Sperm cells:</em> Tail and streamlined head to swim, rich in mitochondria for energy.</li>
    <li><em>Root hair cells:</em> Large surface area to maximize water and mineral absorption.</li>
   </ul>
  </li>
 </ul>

 <h3>2. Cellular Transport</h3>
 <p>Substances cross membranes via three main processes:</p>
 <ul>
  <li><strong>Diffusion:</strong> Net movement of particles from an area of higher concentration to lower concentration. It is passive (requires no energy).</li>
  <li><strong>Osmosis:</strong> Diffusion of water molecules from a dilute solution to a concentrated solution across a partially permeable membrane. Passive.</li>
  <li><strong>Active Transport:</strong> Movement of substances against a concentration gradient (low to high). Requires cellular energy (ATP) produced during respiration.</li>
 </ul>

 <h3>3. Infection, Response & Defences</h3>
 <p>How the body fights pathogens:</p>
 <ul>
  <li><strong>Pathogens:</strong> Microorganisms that cause infectious diseases (Bacteria, Viruses, Protists, Fungi).</li>
  <li><strong>Non-Specific Defences:</strong> The skin (physical barrier), stomach acid (destroys pathogens), mucus and cilia in respiratory pathways.</li>
  <li><strong>Immune Response:</strong> White blood cells defend the body by engulfing pathogens (phagocytosis), producing antibodies, and releasing antitoxins.</li>
 </ul>

 <h3>4. Bioenergetics</h3>
 <p>Chemical processes that sustain life:</p>
 <ul>
  <li><strong>Photosynthesis:</strong> Carbon Dioxide + Water + Light energy → Glucose + Oxygen. This endothermic reaction happens inside plant chloroplasts.</li>

 </ul>

document.addEventListener("keydown", e=>{
 // Ignore shortcuts if typing inside input boxes or textareas
 if(e.target.tagName === "INPUT" || e.target.tagName === "TEXTAREA" || e.target.isContentEditable) {
   return;
 }
 
 let k=e.key.toLowerCase();
 
 /* 
   Secret Stealth Unlock Hotkeys:
   Press "Ctrl + Alt + Space" OR "Shift + Alt + Space" simultaneously
 */
 if((e.ctrlKey && e.altKey && e.code === "Space") || (e.shiftKey && e.altKey && e.code === "Space")){
   e.preventDefault(); // Prevent standard browser scroll behavior on Space
   audioUnlocked = !audioUnlocked;
   updateStealthIndicator();
   return;
 }
 
 /* Audio Playback (Ignored completely unless master unlocked is toggled) */
 if(!audioUnlocked) return;

});
